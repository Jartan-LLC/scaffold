# markdownlint config — lints Markdown structure/consistency (Prettier is off for
# Markdown; this does NOT reformat). Tune rules to taste.
config:
  default: true
  MD013: false # line length — tables and prose legitimately run long
  MD024:
    siblings_only: true # Keep-a-Changelog repeats Added/Changed/Fixed headings
  MD046: false # code-block style — an eval-rst block inside an HTML comment confuses it
  MD060: false # table-column-style — we deliberately don't auto-format tables
globs:
  - "**/*.md"
ignores:
  - "node_modules"
  - "docs/_build"
  - ".claude/workspace"
  - "AGENTS.md" # symlink to CLAUDE.md — lint the target, not the alias
  - ".github/PULL_REQUEST_TEMPLATE.md" # a fragment; starts with ## by design (MD041)
