version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependency"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 3

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependency"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 3
      semver-major-days: 7

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependency"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 3
      semver-major-days: 7

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependency"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 3
