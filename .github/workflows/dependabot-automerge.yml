name: Dependabot Automerge

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  automerge:
    runs-on: ubuntu-24.04
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: fastify/github-action-merge-dependabot@73ec4cbb5e56df5591eae286972d5b2201ffe90f # v3
        with:
          target: minor
          merge-method: squash
          use-github-auto-merge: true
          # Don't auto-merge these — review manually. Docs stack (sphinx/myst/furo)
          # is version-coupled + mid-ecosystem-transition; python is the base image.
          exclude: |
            python
            sphinx
            myst-parser
            furo
